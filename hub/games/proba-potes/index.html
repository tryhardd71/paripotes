<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proba Potes — Forum public</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="/config.js"></script>
    <script>
      (function () {
        var api = window.HUB_CONFIG && window.HUB_CONFIG.probaApi;
        if (api) {
          document.write('<script src="' + api + '/socket.io/socket.io.js"><\/script>');
        }
      })();
    </script>
  </head>
  <body>
    <div class="bg-glow"></div>

    <div id="auth-screen" class="screen">
      <div class="auth-card">
        <div class="logo">
          <span class="logo-icon">🎲</span>
          <h1>Proba Potes</h1>
          <p class="tagline">Forum public de probas</p>
        </div>
        <div class="auth-tabs">
          <button type="button" class="auth-tab active" id="show-login">Connexion</button>
          <button type="button" class="auth-tab" id="show-register">Inscription</button>
        </div>
        <div id="auth-error" class="error hidden"></div>

        <div id="panel-login" class="auth-step">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="pote@email.com" autocomplete="email" />
          <label>Mot de passe</label>
          <input type="password" id="login-password" placeholder="Ton mot de passe" autocomplete="current-password" />
          <label class="remember-row">
            <input type="checkbox" id="remember-me" checked />
            <span>Se souvenir de moi</span>
          </label>
          <button type="button" class="btn btn-primary" id="login-btn">Se connecter</button>
        </div>

        <div id="panel-register-email" class="auth-step hidden">
          <label>Ton email</label>
          <input type="email" id="register-email" placeholder="pote@email.com" />
          <button type="button" class="btn btn-primary" id="send-code-btn">Recevoir mon code</button>
        </div>

        <div id="panel-register-code" class="auth-step hidden">
          <p class="hint">Code envoyé à <strong id="email-display"></strong></p>
          <label>Code à 6 chiffres</label>
          <input type="text" id="code-input" placeholder="123456" maxlength="6" inputmode="numeric" />
          <label>Pseudo</label>
          <input type="text" id="username-input" placeholder="Ton pseudo" maxlength="20" />
          <label>Mot de passe (6 car. min.)</label>
          <input type="password" id="register-password" placeholder="Choisis un mot de passe" />
          <button type="button" class="btn btn-primary" id="register-btn">Créer mon compte</button>
          <button type="button" class="btn btn-secondary" id="back-register-btn">Retour</button>
        </div>
      </div>
    </div>

    <main id="forum-screen" class="screen hidden">
      <div id="app" class="page-wrap"></div>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
