services:
  - type: web
    name: potes-hub
    runtime: node
    plan: free
    rootDir: hub
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PARIPOTES_URL
        value: https://paripotes.onrender.com
      - key: IMPOSTEUR_URL
        value: https://imposteur-mots.onrender.com

  - type: web
    name: paripotes
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: web
    name: imposteur-mots
    runtime: node
    plan: free
    rootDir: imposteur-mots
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production