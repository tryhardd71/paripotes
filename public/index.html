<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PariPotes — Coupe du Monde 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Auth -->
    <div id="auth-screen" class="screen">
      <div class="auth-card">
        <div class="logo">
          <span class="logo-icon">⚽</span>
          <h1>PariPotes</h1>
          <p class="tagline">Paris entre potes — CDM 2026</p>
        </div>

        <div id="step-email" class="auth-step">
          <label>Ton email</label>
          <input type="email" id="email-input" placeholder="pote@email.com" autocomplete="email">
          <button id="send-code-btn" class="btn btn-primary">Recevoir mon code</button>
        </div>

        <div id="step-code" class="auth-step hidden">
          <p class="hint" id="code-sent-hint">On t'a envoyé un code à 6 chiffres sur <strong id="email-display"></strong></p>
          <p class="hint" style="font-size:.8rem;margin-top:-8px;color:var(--muted)">Vérifie tes spams si tu ne le vois pas.</p>
          <label>Entre ton code</label>
          <input type="text" id="code-input" placeholder="123456" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
          <label>Pseudo (pour le classement)</label>
          <input type="text" id="username-input" placeholder="Ton pseudo" maxlength="20">
          <button id="verify-btn" class="btn btn-primary">C'est parti !</button>
          <button id="back-email-btn" class="btn btn-ghost">Changer d'email</button>
        </div>

        <p id="auth-error" class="error hidden"></p>
        <p id="auth-hint" class="dev-hint hidden"></p>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-screen" class="screen hidden">
      <header class="header">
        <div class="header-left">
          <span class="logo-small">⚽ PariPotes</span>
        </div>
        <div class="header-right">
          <span id="user-badge" class="user-badge"></span>
          <button id="logout-btn" class="btn btn-ghost btn-sm">Déco</button>
        </div>
      </header>

      <nav class="tabs">
        <button class="tab active" data-tab="leagues">Ligues</button>
        <button class="tab" data-tab="matches">Matchs</button>
        <button class="tab" data-tab="bets">Mes paris</button>
        <button class="tab" data-tab="leaderboard">Classement</button>
      </nav>

      <main class="content">
        <!-- Ligues -->
        <section id="tab-leagues" class="tab-panel active">
          <div class="panel-header">
            <h2>Mes ligues</h2>
            <button id="create-league-btn" class="btn btn-primary btn-sm">+ Créer</button>
          </div>
          <div id="leagues-list" class="cards-list"></div>

          <div class="join-box">
            <h3>Rejoindre une ligue</h3>
            <div class="join-row">
              <input type="text" id="join-code-input" placeholder="Code à 6 lettres" maxlength="6" style="text-transform:uppercase">
              <button id="join-league-btn" class="btn btn-secondary">Rejoindre</button>
            </div>
          </div>
        </section>

        <!-- Matchs -->
        <section id="tab-matches" class="tab-panel">
          <div class="panel-header">
            <h2>Matchs CDM 2026</h2>
            <div class="filter-pills">
              <button class="pill active" data-filter="upcoming">À venir</button>
              <button class="pill" data-filter="all">Tous</button>
              <button class="pill" data-filter="finished">Terminés</button>
            </div>
          </div>
          <p id="no-league-hint" class="hint-banner hidden">Sélectionne une ligue dans l'onglet Ligues pour parier.</p>
          <div id="matches-list" class="matches-list"></div>
        </section>

        <!-- Mes paris -->
        <section id="tab-bets" class="tab-panel">
          <div class="panel-header"><h2>Mes paris</h2></div>
          <div id="bets-list" class="cards-list"></div>
        </section>

        <!-- Classement -->
        <section id="tab-leaderboard" class="tab-panel">
          <div class="panel-header"><h2>Classement</h2></div>
          <div id="leaderboard" class="leaderboard"></div>
        </section>
      </main>

      <div id="active-league-bar" class="league-bar hidden">
        <span>Ligue active : <strong id="active-league-name"></strong></span>
        <span class="points-pill" id="active-league-points"></span>
      </div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal" id="modal-content"></div>
    </div>

    <!-- Bet slip -->
    <div id="bet-slip" class="bet-slip hidden">
      <div class="bet-slip-header">
        <h3>Placer un pari</h3>
        <button id="close-bet-slip" class="btn-close">×</button>
      </div>
      <div id="bet-slip-body"></div>
    </div>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
